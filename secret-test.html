<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020202;
      color: #555;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      transition: background 1s ease;
    }

    /* THE FAKE FRONT PAGE */
    #innocent-screen {
      text-align: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    /* THE HIDDEN FRIENDLY DASHBOARD */
    #magic-dashboard {
      display: none; /* Hidden by default */
      opacity: 0;
      transform: translateY(20px);
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 20px;
      border: 1px solid rgba(0, 191, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 191, 255, 0.1);
      transition: opacity 1s ease, transform 1s ease;
    }

    #magic-dashboard h1 {
      color: white;
      font-size: 36px;
      margin-bottom: 10px;
    }

    #magic-dashboard h1 span {
      color: #00bfff;
    }

    #magic-dashboard p {
      color: #ccc;
      font-size: 18px;
      margin-bottom: 30px;
    }

    .admin-btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .admin-btn:hover {
      background: #fff;
      box-shadow: 0 0 15px rgba(0, 191, 255, 0.5);
    }
  </style>
</head>
<body>

  <div id="innocent-screen">
    <h2>404</h2>
    <p>Page not found or still under construction.</p>
  </div>

  <div id="magic-dashboard">
    <h1>Welcome back, <span>Lathu!</span> ✨</h1>
    <p>Hope you are having a wonderful day. Your private console is ready.</p>
    <button class="admin-btn">Add New Movies</button>
  </div>

  <script>
    // 🤫 THE FRIENDLY KEYBOARD LISTENER
    const secretWord = "lathu"; 
    let typedBuffer = "";

    document.addEventListener('keydown', (e) => {
      // Ignore special keys like Shift, Enter, etc.
      if (e.key.length === 1) {
        typedBuffer += e.key.toLowerCase();
      }
      
      // Keep the buffer at exactly 5 letters
      if (typedBuffer.length > secretWord.length) {
        typedBuffer = typedBuffer.substring(1);
      }
      
      // TRIGGER THE MAGIC
      if (typedBuffer === secretWord) {
        typedBuffer = ""; // Reset it so it doesn't trigger twice
        
        // 1. Fade out the fake screen
        const innocent = document.getElementById('innocent-screen');
        innocent.style.opacity = "0";
        innocent.style.transform = "translateY(-20px)";
        
        // 2. Wait a split second, hide it, and show the dashboard
        setTimeout(() => {
          innocent.style.display = "none";
          
          const dashboard = document.getElementById('magic-dashboard');
          dashboard.style.display = "block";
          
          // 3. Trigger the smooth fade-in animation
          setTimeout(() => {
            dashboard.style.opacity = "1";
            dashboard.style.transform = "translateY(0)";
            document.body.style.background = "#070b14"; // Lighten the background slightly
          }, 50);
          
        }, 500);
      }
    });
  </script>
</body>
</html>
