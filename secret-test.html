<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020202;
      color: #555;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      transition: background 1s ease;
      
      /* Stops mobile browsers from highlighting text when you long-press */
      user-select: none; 
      -webkit-user-select: none;
    }

    #innocent-screen {
      text-align: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
      padding: 50px;
    }

    #magic-dashboard {
      display: none;
      opacity: 0;
      transform: translateY(20px);
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 20px;
      border: 1px solid rgba(0, 191, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 191, 255, 0.1);
      transition: opacity 1s ease, transform 1s ease;
    }

    #magic-dashboard h1 { color: white; font-size: 36px; margin-bottom: 10px; }
    #magic-dashboard h1 span { color: #00bfff; }
    #magic-dashboard p { color: #ccc; font-size: 18px; margin-bottom: 30px; }

    .admin-btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .admin-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(0, 191, 255, 0.5); }
  </style>
</head>
<body>

  <div id="innocent-screen">
    <h2>404</h2>
    <p>Page not found or still under construction.</p>
  </div>

  <div id="magic-dashboard">
    <h1>Welcome back, <span>Lathu!</span> ✨</h1>
    <p>Hope you are having a wonderful day. Your private console is ready.</p>
    <button class="admin-btn">Add New Movies</button>
  </div>

  <script>
    const secretWord = "/lathu"; // Added a slash so it's impossible to type by accident
    
    // THE UNLOCK ANIMATION FUNCTION
    function unlockDashboard() {
      const innocent = document.getElementById('innocent-screen');
      innocent.style.opacity = "0";
      innocent.style.transform = "translateY(-20px)";
      
      setTimeout(() => {
        innocent.style.display = "none";
        const dashboard = document.getElementById('magic-dashboard');
        dashboard.style.display = "block";
        
        setTimeout(() => {
          dashboard.style.opacity = "1";
          dashboard.style.transform = "translateY(0)";
          document.body.style.background = "#070b14"; 
        }, 50);
      }, 500);
    }

    // ==========================================
    // 💻 DESKTOP: THE KEYBOARD LISTENER
    // ==========================================
    let typedBuffer = "";
    document.addEventListener('keydown', (e) => {
      if (e.key.length === 1) {
        typedBuffer += e.key.toLowerCase();
      }
      if (typedBuffer.length > secretWord.length) {
        typedBuffer = typedBuffer.substring(1);
      }
      if (typedBuffer === secretWord) {
        typedBuffer = ""; 
        unlockDashboard();
      }
    });

    // ==========================================
    // 📱 MOBILE: THE 3-SECOND LONG PRESS
    // ==========================================
    let touchTimer;
    const touchTarget = document.getElementById('innocent-screen');

    // When the user touches the screen, start a 3-second timer
    touchTarget.addEventListener('touchstart', (e) => {
      touchTimer = setTimeout(() => {
        // After 3 seconds of holding, ask for the password
        let passcode = prompt("Identify yourself:");
        if (passcode !== null && passcode.toLowerCase() === "lathu") {
          unlockDashboard();
        } else if (passcode !== null) {
          alert("Access Denied.");
        }
      }, 3000); // 3000 milliseconds = 3 seconds
    });

    // If they lift their finger or scroll before 3 seconds, cancel the timer
    touchTarget.addEventListener('touchend', () => { clearTimeout(touchTimer); });
    touchTarget.addEventListener('touchmove', () => { clearTimeout(touchTimer); });

  </script>
</body>
</html>
