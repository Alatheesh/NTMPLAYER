<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here...</title>
  <style>
    body {
      margin: 0; padding: 0; background: #020202; color: #555;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex; justify-content: center; align-items: center;
      height: 100vh; overflow: hidden; transition: background 1s ease;
      user-select: none; -webkit-user-select: none;
    }
    #innocent-screen { text-align: center; transition: opacity 0.5s ease, transform 0.5s ease; padding: 50px; cursor: pointer; }
    #magic-dashboard {
      display: none; opacity: 0; transform: translateY(20px); text-align: center;
      background: rgba(255, 255, 255, 0.05); padding: 50px; border-radius: 20px;
      border: 1px solid rgba(0, 191, 255, 0.2); box-shadow: 0 10px 40px rgba(0, 191, 255, 0.1);
      transition: opacity 1s ease, transform 1s ease;
    }
    #magic-dashboard h1 { color: white; font-size: 36px; margin-bottom: 10px; }
    #magic-dashboard h1 span { color: #00bfff; }
    #magic-dashboard p { color: #ccc; font-size: 18px; margin-bottom: 30px; }
    .admin-btn {
      background: #00bfff; color: #000; border: none; padding: 12px 24px;
      border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; transition: 0.3s;
    }
    .admin-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(0, 191, 255, 0.5); }
  </style>
</head>
<body>

  <div id="innocent-screen">
    <h2>404</h2>
    <p>Page not found or still under construction.</p>
  </div>

  <div id="magic-dashboard">
    <h1>Welcome back, <span>Boss.</span> ✨</h1>
    <p>Hope you are having a wonderful day. Your private console is ready.</p>
    <button class="admin-btn">Add New Movies</button>
  </div>

  <script>
    // 🛡️ THE SHREDDER
    function shred(word) {
      let scrambled = "";
      for (let i = 0; i < word.length; i++) {
        scrambled += String.fromCharCode(word.charCodeAt(i) + 5);
      }
      return scrambled;
    }

    // 🤫 THE MASTER KEY ("lathu")
    const bossHash = "qfymz"; 

    // 📖 THE TRAP DICTIONARY
    const trapDictionary = {
      "firns":  "Nice try, hacker. Admin privileges denied! 🛑",
      "mfhp":   "Did you really think 'hack' would work? Go watch a movie. 🍿",
      "wtty":   "I am Groot. I mean... Root access denied. 🌳",
      "mniijs": "Wow, what an explorer! You found out the super panel which is hidden! 🕵️‍♂️",
      "xjhwjy": "It's a secret to everybody... except you, apparently. But still no access. 🤫",
      "qtlns":  "Login attempt logged. Sending your IP to the cyber police! 🚓",
      "yjxy":   "Test failed successfully. Grade: F. 📝",
      "zxjw":   "You are just a normal user. Know your place! 🧑‍💻",
      "xzit":   "This incident will be reported. 🐧",
      "htij":   "You don't have the source code, my friend. 💻"
    };

    // ⏱️ THE LOCKOUT SYSTEM
    let systemLocked = false;

    function unlockDashboard() {
      const innocent = document.getElementById('innocent-screen');
      innocent.style.opacity = "0"; innocent.style.transform = "translateY(-20px)";
      setTimeout(() => {
        innocent.style.display = "none";
        const dashboard = document.getElementById('magic-dashboard');
        dashboard.style.display = "block";
        setTimeout(() => {
          dashboard.style.opacity = "1"; dashboard.style.transform = "translateY(0)";
          document.body.style.background = "#070b14"; 
        }, 50);
      }, 500);
    }

    function processSecurityCheck(inputText, isFromPromptBox) {
      let hashed = shred(inputText.toLowerCase().trim());
      
      // 1. Boss Check (Always runs, even if system is locked)
      if (hashed.endsWith(bossHash)) {
        unlockDashboard();
        return true; 
      }
      
      // 2. Dictionary Traps
      for (const [trapHash, responseMessage] of Object.entries(trapDictionary)) {
        if (hashed.endsWith(trapHash)) {
          alert(responseMessage);
          return true;
        }
      }

      // 3. Random Guesses -> Trigger the Lockout!
      if (isFromPromptBox) {
        systemLocked = true; // Lock the system!
        alert("The hidden word is wrong. System locked. Try again in 15 seconds. 🛑");
        
        // Unlock it automatically after 15 seconds (15000 milliseconds)
        setTimeout(() => {
          systemLocked = false;
        }, 15000);
        
        return true;
      }

      return false;
    }

    // ==========================================
    // 💻 DESKTOP: THE KEYBOARD LISTENER
    // ==========================================
    let typedBuffer = "";
    document.addEventListener('keydown', (e) => {
      if (e.key.length === 1) typedBuffer += e.key;
      if (typedBuffer.length > 15) typedBuffer = typedBuffer.substring(1);
      
      // If the boss types their name silently, let them in immediately!
      if (shred(typedBuffer.toLowerCase()).endsWith(bossHash)) {
        typedBuffer = "";
        unlockDashboard();
        return;
      }

      // If the system is locked, ignore all other typing
      if (systemLocked) return;

      // Check traps
      if (processSecurityCheck(typedBuffer, false)) {
        typedBuffer = ""; 
      }
    });

    // ==========================================
    // 📱 MOBILE / MENU: THE PROMPT BOX
    // ==========================================
    let touchTimer;
    const touchTarget = document.getElementById('innocent-screen');

    function openMobilePrompt() {
      // If they try to open the menu while locked, reject them immediately!
      if (systemLocked) {
        alert("System is currently locked. Please wait... ⏱️");
        return;
      }

      let attempt = prompt("⚠️ SECURE SYSTEM ⚠️\n\nEnter Master Passcode:");
      if (attempt !== null && attempt.trim() !== "") {
        processSecurityCheck(attempt, true);
      }
    }

    // Desktop trap: If they hit the 'Escape' key or click 3 times fast (Optional ways to open menu)
    // For now, we rely on the 3-second long press or trap words to open the menu
    touchTarget.addEventListener('touchstart', () => { touchTimer = setTimeout(openMobilePrompt, 3000); });
    touchTarget.addEventListener('touchend', () => { clearTimeout(touchTimer); });
    touchTarget.addEventListener('touchmove', () => { clearTimeout(touchTimer); });

  </script>
</body>
</html>
