<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nothing to see here...</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #020202;
      color: #555;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      transition: background 1s ease;
      
      /* Stops mobile browsers from highlighting text when you long-press */
      user-select: none; 
      -webkit-user-select: none;
    }

    #innocent-screen {
      text-align: center;
      transition: opacity 0.5s ease, transform 0.5s ease;
      padding: 50px;
    }

    #magic-dashboard {
      display: none;
      opacity: 0;
      transform: translateY(20px);
      text-align: center;
      background: rgba(255, 255, 255, 0.05);
      padding: 50px;
      border-radius: 20px;
      border: 1px solid rgba(0, 191, 255, 0.2);
      box-shadow: 0 10px 40px rgba(0, 191, 255, 0.1);
      transition: opacity 1s ease, transform 1s ease;
    }

    #magic-dashboard h1 { color: white; font-size: 36px; margin-bottom: 10px; }
    #magic-dashboard h1 span { color: #00bfff; }
    #magic-dashboard p { color: #ccc; font-size: 18px; margin-bottom: 30px; }

    .admin-btn {
      background: #00bfff;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    .admin-btn:hover { background: #fff; box-shadow: 0 0 15px rgba(0, 191, 255, 0.5); }
  </style>
</head>
<body>

  <div id="innocent-screen">
    <h2>404</h2>
    <p>Page not found or still under construction.</p>
  </div>

  <div id="magic-dashboard">
    <h1>Welcome back, <span>Lathu!</span> ✨</h1>
    <p>Hope you are having a wonderful day. Your private console is ready.</p>
    <button class="admin-btn">Add New Movies</button>
  </div>

  <script>
    // THE UNLOCK ANIMATION
    function unlockDashboard() {
      const innocent = document.getElementById('innocent-screen');
      innocent.style.opacity = "0";
      innocent.style.transform = "translateY(-20px)";
      
      setTimeout(() => {
        innocent.style.display = "none";
        const dashboard = document.getElementById('magic-dashboard');
        dashboard.style.display = "block";
        
        setTimeout(() => {
          dashboard.style.opacity = "1";
          dashboard.style.transform = "translateY(0)";
          document.body.style.background = "#070b14"; 
        }, 50);
      }, 500);
    }

    // 🍯 THE HONEYPOT TRAP FUNCTION (Runs when prompt box opens)
    function openHoneypotMenu() {
      let attempt = prompt("⚠️ SECURE SYSTEM ⚠️\n\nEnter Master Passcode:");
      
      if (attempt === "lathu") {
        // You typed the real password into the box
        unlockDashboard();
      } else if (attempt !== null && attempt.trim() !== "") {
        // They typed something wrong! Launch the troll messages!
        const trollMessages = [
          "Wow, you found the secret base! Too bad you don't know the password. Here is a potato 🥔",
          "ACCESS DENIED. Sending your browser history to your parents... just kidding.",
          "Nice try, hacker. Go back to watching movies.",
          "Error 404: Hacking skills not found.",
          "Security Alert: FBI has been dispatched to your location 🚓",
          "Password Incorrect. Self-destruct sequence initiated in 3... 2... 1..."
        ];
        let randomJoke = trollMessages[Math.floor(Math.random() * trollMessages.length)];
        alert(randomJoke);
      }
    }

    // ==========================================
    // 💻 DESKTOP: THE KEYBOARD LISTENER
    // ==========================================
    let typedBuffer = "";
    document.addEventListener('keydown', (e) => {
      if (e.key.length === 1) {
        typedBuffer += e.key.toLowerCase();
      }
      
      // Keep buffer at 5 letters max
      if (typedBuffer.length > 5) {
        typedBuffer = typedBuffer.substring(1);
      }
      
      // TRAP TRIGGER: If they type "admin", open the prompt box
      if (typedBuffer === "admin") {
        typedBuffer = ""; // reset
        setTimeout(openHoneypotMenu, 100);
      }
      
      // SILENT BOSS TRIGGER: If you just type "lathu" directly on the page, unlock instantly!
      if (typedBuffer === "lathu") {
        typedBuffer = ""; // reset
        unlockDashboard();
      }
    });

    // ==========================================
    // 📱 MOBILE: THE 3-SECOND LONG PRESS
    // ==========================================
    let touchTimer;
    const touchTarget = document.getElementById('innocent-screen');

    // Start 3-second timer on touch
    touchTarget.addEventListener('touchstart', (e) => {
      touchTimer = setTimeout(() => {
        openHoneypotMenu(); // Open the trap box!
      }, 3000);
    });

    // Cancel the timer if they let go or scroll
    touchTarget.addEventListener('touchend', () => { clearTimeout(touchTimer); });
    touchTarget.addEventListener('touchmove', () => { clearTimeout(touchTimer); });

  </script>
</body>
</html>
